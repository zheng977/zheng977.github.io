name: Deploy Homepage & Project Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build MutiAgent4Fraud
        run: |
          cd MutiAgent4Fraud
          rm -rf node_modules package-lock.json
          npm install
          npx astro build --base "/MutiAgent4Fraud/"

      - name: Prepare artifact structure
        run: |
          mkdir -p site-output/MutiAgent4Fraud
          # Copy homepage (root files)
          cp index.html site-output/
          cp stylesheet.css site-output/
          cp -r images site-output/
          # Copy project page
          cp -r MutiAgent4Fraud/dist/* site-output/MutiAgent4Fraud/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
